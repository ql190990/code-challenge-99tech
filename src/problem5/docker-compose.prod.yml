services:
  postgres:
    image: postgres:16-alpine
    container_name: problem5-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: problem5
    ports:
      # In real production, comment this out and use a managed database
      # service (RDS, Cloud SQL, etc.). The port mapping is kept here so
      # `docker compose -f docker-compose.prod.yml up -d` works out of the
      # box for local testing.
      - "5433:5432"
    volumes:
      - problem5_pg_data_prod:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/10-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d problem5"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: problem5-api-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:'+(process.env.PORT||3000)+'/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

volumes:
  problem5_pg_data_prod:
    name: problem5_pg_data_prod
